version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: governance-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mainnet}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: governance-indexer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NETWORK=${NETWORK:-mainnet}
      - PG_CONNECTION_STRING=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mainnet}
      - APIBARA_URL=${APIBARA_URL}
      - DNA_TOKEN=${DNA_TOKEN}
      - GOVERNOR_ADDRESS=${GOVERNOR_ADDRESS}
      - VOTES_TOKEN_ADDRESS=${VOTES_TOKEN_ADDRESS}
      - STARTING_CURSOR_BLOCK_NUMBER=${STARTING_CURSOR_BLOCK_NUMBER:-0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NO_BLOCKS_TIMEOUT_MS=${NO_BLOCKS_TIMEOUT_MS:-120000}
    restart: unless-stopped

  postgrest:
    image: postgrest/postgrest:latest
    container_name: governance-postgrest
    ports:
      - "${POSTGREST_PORT:-3000}:3000"
    environment:
      PGRST_DB_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mainnet}
      PGRST_DB_ANON_ROLE: ${POSTGRES_USER:-postgres}
      PGRST_DB_SCHEMA: public
      PGRST_OPENAPI_SERVER_PROXY_URI: ${POSTGREST_URL:-http://localhost:3000}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_POOL: 10
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: 10
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: governance-ui
    ports:
      - "${UI_PORT:-8080}:80"
    environment:
      - VITE_POSTGREST_URL=${POSTGREST_URL:-http://localhost:3000}
    depends_on:
      - postgrest
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  default:
    name: governance-network
