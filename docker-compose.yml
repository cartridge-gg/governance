version: '3.8'

services:
  # PostgreSQL for governance data
  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${GOVERNANCE_DB:-mainnet}
    ports:
      - "${GOVERNANCE_DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - network

  # Governance indexer
  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: indexer
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NETWORK=${NETWORK:-mainnet}
      - PG_CONNECTION_STRING=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${GOVERNANCE_DB:-mainnet}
      - APIBARA_URL=${APIBARA_URL}
      - DNA_TOKEN=${DNA_TOKEN}
      - GOVERNOR_ADDRESS=${GOVERNOR_ADDRESS}
      - VOTES_TOKEN_ADDRESS=${VOTES_TOKEN_ADDRESS}
      - STARTING_CURSOR_BLOCK_NUMBER=${STARTING_CURSOR_BLOCK_NUMBER:-0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NO_BLOCKS_TIMEOUT_MS=${NO_BLOCKS_TIMEOUT_MS:-0}
    restart: unless-stopped
    networks:
      - network

  # Governance API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    environment:
      PORT: 4000
      GOVERNANCE_DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${GOVERNANCE_DB:-mainnet}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      CACHE_TTL_PROPOSALS: ${CACHE_TTL_PROPOSALS:-120}
      CACHE_TTL_VOTES: ${CACHE_TTL_VOTES:-60}
      CACHE_TTL_DELEGATES: ${CACHE_TTL_DELEGATES:-300}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - network

volumes:
  db-data:

networks:
  network:
    driver: bridge
